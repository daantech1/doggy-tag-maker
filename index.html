<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doggy Tag Maker</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"}}</script>
<style>
*{box-sizing:border-box}body{margin:0;height:100vh;overflow:hidden;font-family:Arial,sans-serif;display:flex;background:radial-gradient(circle at top right,#fff4df,#f7dfbd 45%,#d99b57);color:#2d1b10}
#panel{width:340px;padding:24px;background:linear-gradient(180deg,#fffaf1,#ffe3bd);border-right:5px solid #d87b25;box-shadow:10px 0 35px #0002;z-index:10}
#madeNL{position:fixed;top:12px;left:360px;width:82px;background:#fffaf1;border:1px solid #d87b25;border-radius:9px;padding:5px;text-align:center;box-shadow:0 4px 12px #0002;z-index:20}
#madeNL img{width:100%;border-radius:4px;display:block;margin-bottom:4px}#madeNL div{font-size:7px;font-weight:900;line-height:1.05;letter-spacing:.25px}
h1{font-size:30px;margin:0 0 8px}.subtitle{font-size:14px;color:#704c2d;margin-bottom:22px}.paw{font-size:31px;margin-bottom:8px}
label{display:block;margin-top:15px;font-weight:900;font-size:14px}input,select{width:100%;padding:12px;margin-top:7px;border-radius:13px;border:2px solid #eda85d;background:white;font-size:15px;outline:none}
input:focus,select:focus{border-color:#ff6b1a}.row{display:flex;align-items:center;gap:8px;margin-top:12px;font-weight:900}.row input{width:auto;margin:0}
button{width:100%;margin-top:14px;padding:14px;border:0;border-radius:15px;font-size:15px;font-weight:900;cursor:pointer}
#previewBtn{background:linear-gradient(135deg,#ffbf4b,#ff8d1a);color:#2d1b10}#downloadBtn{background:linear-gradient(135deg,#55b957,#23963c);color:white}
button:hover{transform:translateY(-1px);filter:brightness(1.04)}#status{margin-top:16px;padding:12px;border-radius:13px;background:#fff2df;font-size:13px;color:#5c3a21}
#viewer{flex:1;position:relative}.badge{font-size:12px;margin-top:16px;color:#704c2d;text-align:center;font-weight:900}
</style>
</head>
<body>

<div id="madeNL"><img src="dutch-flag.jpg" alt="Dutch flag"><div>MADE IN THE NETHERLANDS</div></div>

<div id="panel">
  <div class="paw">🐶 🐾</div>
  <h1>Doggy Tag Maker</h1>
  <div class="subtitle">Create a custom dog tag with a name</div>

  <label>Design</label>
  <select id="design">
    <option value="bone-with-rounding.stl">Bone with rounding</option>
    <option value="empty-bone.stl">Empty bone</option>
  </select>

  <label>Dog name</label>
  <input id="dogName" value="JACK">

  <label>Font</label>
  <select id="fontSelect">
    <option value="helvetiker">Helvetiker</option>
    <option value="optimer">Optimer</option>
    <option value="gentilis">Gentilis</option>
    <option value="changa">Changa One</option>
  </select>

  <div class="row"><input id="boldText" type="checkbox" checked><span>Bold text</span></div>

  <label>Text size</label>
  <input id="textSize" type="number" value="14" step="0.5">

  <button id="previewBtn">🐾 Update preview</button>
  <button id="downloadBtn">⬇ Download STL</button>

  <div id="status">Loading...</div>
  <div class="badge">Custom 3D dog tags</div>
</div>

<div id="viewer"></div>

<script type="module">
import*as THREE from"three";
import{STLLoader}from"three/addons/loaders/STLLoader.js";
import{STLExporter}from"three/addons/exporters/STLExporter.js";
import{OrbitControls}from"three/addons/controls/OrbitControls.js";
import{FontLoader}from"three/addons/loaders/FontLoader.js";
import{TextGeometry}from"three/addons/geometries/TextGeometry.js";

let scene,camera,renderer,controls,tagMesh=null,textMesh=null,font=null,fontKey="";
const $=id=>document.getElementById(id),status=$("status");

const fonts={
  helvetiker:{
    regular:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/helvetiker_regular.typeface.json",
    bold:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/helvetiker_bold.typeface.json"
  },
  optimer:{
    regular:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/optimer_regular.typeface.json",
    bold:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/optimer_bold.typeface.json"
  },
  gentilis:{
    regular:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/gentilis_regular.typeface.json",
    bold:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/gentilis_bold.typeface.json"
  },
  changa:{
    regular:"changa-one.typeface.json",
    bold:"changa-one.typeface.json"
  }
};

$("previewBtn").onclick=updateModel;
$("downloadBtn").onclick=downloadSTL;
$("design").onchange=updateModel;
$("dogName").oninput=updateModel;
$("fontSelect").onchange=loadFont;
$("boldText").onchange=loadFont;

init();

function init(){
  const v=$("viewer");
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xfff1df);

  camera=new THREE.PerspectiveCamera(45,v.clientWidth/v.clientHeight,.1,2000);
  camera.position.set(0,-100,0);
  camera.up.set(0,0,1);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(v.clientWidth,v.clientHeight);
  renderer.setPixelRatio(devicePixelRatio);
  v.appendChild(renderer.domElement);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.target.set(0,0,0);
  controls.update();

  scene.add(new THREE.AmbientLight(0xffffff,.9));

  const l1=new THREE.DirectionalLight(0xffffff,1.15);
  l1.position.set(40,-60,90);
  scene.add(l1);

  const l2=new THREE.DirectionalLight(0xffcc99,.55);
  l2.position.set(-70,40,70);
  scene.add(l2);

  loadFont();
  addEventListener("resize",resizeViewer);
  animate();
}

function loadFont(){
  const fam=$("fontSelect").value,weight=$("boldText").checked?"bold":"regular",key=fam+"-"+weight;
  if(key===fontKey&&font){updateModel();return}
  fontKey=key;
  status.textContent="Loading font...";
  new FontLoader().load(fonts[fam][weight],f=>{font=f;updateModel()},undefined,e=>{
    status.textContent=fam==="changa"?"Missing changa-one.typeface.json file.":"Font could not be loaded.";
    console.error(e);
  });
}

function makeText(t,s,h){
  const b=$("boldText").checked;
  return new TextGeometry(t,{
    font:font,
    size:s,
    height:h,
    curveSegments:12,
    bevelEnabled:true,
    bevelThickness:b?.22:.15,
    bevelSize:b?.13:.08,
    bevelSegments:2
  });
}

function updateModel(){
  if(!font){status.textContent="Loading font...";return}
  status.textContent="Loading model...";

  const name=$("dogName").value.trim()||"DOG",file=$("design").value;
  let size=parseFloat($("textSize").value)||14,height=1.8;

  if(tagMesh){scene.remove(tagMesh);tagMesh.geometry.dispose()}
  if(textMesh){scene.remove(textMesh);textMesh.geometry.dispose()}

  new STLLoader().load(file,g=>{
    g.center();g.computeBoundingBox();
    const maxW=(g.boundingBox.max.x-g.boundingBox.min.x)*.62;

    tagMesh=new THREE.Mesh(g,new THREE.MeshStandardMaterial({color:0x9a713e,roughness:.42,metalness:.05}));
    tagMesh.rotation.x=-Math.PI/2;
    scene.add(tagMesh);

    let cur=size,tg=makeText(name,cur,height);
    tg.computeBoundingBox();
    let w=tg.boundingBox.max.x-tg.boundingBox.min.x;

    while(w>maxW&&cur>2){
      cur-=.25;tg.dispose();
      tg=makeText(name,cur,height);
      tg.computeBoundingBox();
      w=tg.boundingBox.max.x-tg.boundingBox.min.x;
    }

    tg.center();

    textMesh=new THREE.Mesh(tg,new THREE.MeshStandardMaterial({color:0x321500,roughness:.35,metalness:.05}));
    textMesh.position.set(0,1.5,-.5);
    textMesh.rotation.x=THREE.MathUtils.degToRad(90);
    textMesh.rotation.y=THREE.MathUtils.degToRad(0);
    textMesh.rotation.z=THREE.MathUtils.degToRad(0);
    scene.add(textMesh);

    camera.position.set(0,-100,0);
    camera.up.set(0,0,1);
    controls.target.set(0,0,0);
    controls.update();

    status.textContent="Preview ready 🐾";
  },undefined,e=>{
    status.textContent="STL could not be loaded. Check the exact file name.";
    console.error(e);
  });
}

function downloadSTL(){
  if(!tagMesh||!textMesh){status.textContent="Create a preview first.";return}
  const ex=new THREE.Scene();
  ex.add(tagMesh.clone(),textMesh.clone());
  const stl=new STLExporter().parse(ex);
  const n=($("dogName").value.trim()||"dog").replace(/[^a-z0-9]/gi,"_").toLowerCase();
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([stl],{type:"text/plain"}));
  a.download="doggy-tag-"+n+".stl";
  document.body.appendChild(a);a.click();a.remove();
  status.textContent="STL downloaded ✅";
}

function resizeViewer(){
  const v=$("viewer");
  camera.aspect=v.clientWidth/v.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(v.clientWidth,v.clientHeight);
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
</script>
</body>
</html>
