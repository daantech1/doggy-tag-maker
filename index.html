<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doggy Tag Maker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  font-family:Arial,sans-serif;
  display:flex;
  background:linear-gradient(135deg,#ffe7d1,#fff7ed);
  color:#3b2a1f;
}

#madeNL{
  position:fixed;
  top:12px;
  left:350px;
  z-index:20;
  width:82px;
  background:#fff8ef;
  border:1px solid #f6b26b;
  border-radius:8px;
  padding:5px;
  text-align:center;
  box-shadow:0 3px 8px rgba(0,0,0,.15);
}

#madeNL img{
  width:100%;
  height:auto;
  border-radius:4px;
  display:block;
  margin-bottom:4px;
}

#madeNL div{
  font-size:7px;
  font-weight:bold;
  color:#3b2a1f;
  letter-spacing:.3px;
  line-height:1.1;
}

#panel{
  width:330px;
  padding:22px;
  background:#fff8ef;
  border-right:4px solid #f6b26b;
  box-shadow:8px 0 25px rgba(0,0,0,.12);
  z-index:10;
}

h1{
  margin:0 0 6px;
  font-size:28px;
}

.subtitle{
  margin-bottom:22px;
  font-size:14px;
  color:#7a5c43;
}

label{
  display:block;
  margin-top:15px;
  font-weight:bold;
  font-size:14px;
}

input,select{
  width:100%;
  padding:11px;
  margin-top:7px;
  border-radius:12px;
  border:2px solid #f3c38b;
  background:white;
  font-size:15px;
  outline:none;
}

input:focus,select:focus{
  border-color:#ff8c42;
}

.checkboxRow{
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
  font-weight:bold;
}

.checkboxRow input{
  width:auto;
  margin:0;
}

button{
  width:100%;
  margin-top:13px;
  padding:13px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
}

#previewBtn{
  background:#ffb347;
  color:#3b2a1f;
}

#downloadBtn{
  background:#4caf50;
  color:white;
}

button:hover{
  transform:translateY(-1px);
  filter:brightness(1.04);
}

#status{
  margin-top:16px;
  padding:12px;
  border-radius:12px;
  background:#fff0dc;
  font-size:13px;
  color:#5c4633;
}

#viewer{
  flex:1;
  position:relative;
}

.paw{
  font-size:32px;
  margin-bottom:8px;
}
</style>
</head>

<body>

<div id="madeNL">
  <img src="dutch-flag.jpg" alt="Dutch flag">
  <div>MADE IN THE NETHERLANDS</div>
</div>

<div id="panel">
  <div class="paw">🐶 🐾 🦴</div>
  <h1>3D Doggy Tag Creator</h1>
  <div class="subtitle">Design a premium 3D printable dog tags in seconds!</div>

  <label>Design</label>
  <select id="design">
    <option value="bone-with-rounding.stl">Bone with rounding</option>
    <option value="empty-bone.stl">Empty bone</option>
  </select>

  <label>Dog name</label>
  <input id="dogName" value="JACK">

  <label>Font</label>
  <select id="fontSelect">
    <option value="helvetiker">Helvetiker</option>
    <option value="optimer">Optimer</option>
    <option value="gentilis">Gentilis</option>
  </select>

  <div class="checkboxRow">
    <input id="boldText" type="checkbox">
    <span>Bold text</span>
  </div>

  <label>Text size</label>
  <input id="textSize" type="number" value="8" step="0.5">

  <label>Text thickness</label>
  <input id="textHeight" type="number" value="1.8" step="0.1">

  <button id="previewBtn">🐾 Update preview</button>
  <button id="downloadBtn">⬇ Download STL</button>

  <div id="status">Loading...</div>
</div>

<div id="viewer"></div>

<script type="module">
import * as THREE from "three";
import { STLLoader } from "three/addons/loaders/STLLoader.js";
import { STLExporter } from "three/addons/exporters/STLExporter.js";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { FontLoader } from "three/addons/loaders/FontLoader.js";
import { TextGeometry } from "three/addons/geometries/TextGeometry.js";

let scene,camera,renderer,controls;
let tagMesh=null,textMesh=null,font=null;
let currentFontKey="";

const status=document.getElementById("status");

const fontUrls={
  helvetiker:{
    regular:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/helvetiker_regular.typeface.json",
    bold:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/helvetiker_bold.typeface.json"
  },
  optimer:{
    regular:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/optimer_regular.typeface.json",
    bold:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/optimer_bold.typeface.json"
  },
  gentilis:{
    regular:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/gentilis_regular.typeface.json",
    bold:"https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/gentilis_bold.typeface.json"
  }
};

document.getElementById("previewBtn").addEventListener("click",updateModel);
document.getElementById("downloadBtn").addEventListener("click",downloadSTL);
document.getElementById("design").addEventListener("change",updateModel);
document.getElementById("dogName").addEventListener("input",updateModel);
document.getElementById("fontSelect").addEventListener("change",loadSelectedFont);
document.getElementById("boldText").addEventListener("change",loadSelectedFont);

init();

function init(){
  const viewer=document.getElementById("viewer");

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0xfff4e8);

  camera=new THREE.PerspectiveCamera(
    45,
    viewer.clientWidth/viewer.clientHeight,
    .1,
    2000
  );

  camera.position.set(0,100,0);

  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(viewer.clientWidth,viewer.clientHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  viewer.appendChild(renderer.domElement);

  controls=new OrbitControls(camera,renderer.domElement);
  controls.enableDamping=true;
  controls.target.set(0,0,0);
  controls.update();

  scene.add(new THREE.AmbientLight(0xffffff,.85));

  const light=new THREE.DirectionalLight(0xffffff,1.1);
  light.position.set(40,-50,90);
  scene.add(light);

  const secondLight=new THREE.DirectionalLight(0xffcc99,.5);
  secondLight.position.set(-60,40,60);
  scene.add(secondLight);

  loadSelectedFont();

  window.addEventListener("resize",resizeViewer);
  animate();
}

function loadSelectedFont(){
  const family=document.getElementById("fontSelect").value;
  const bold=document.getElementById("boldText").checked;
  const weight=bold?"bold":"regular";
  const key=family+"-"+weight;

  if(key===currentFontKey && font){
    updateModel();
    return;
  }

  currentFontKey=key;
  status.textContent="Loading font...";

  new FontLoader().load(
    fontUrls[family][weight],
    function(loadedFont){
      font=loadedFont;
      updateModel();
    },
    undefined,
    function(error){
      status.textContent="Font could not be loaded.";
      console.error(error);
    }
  );
}

function createTextGeometry(text,size,height){
  const isBold=document.getElementById("boldText").checked;

  return new TextGeometry(text,{
    font:font,
    size:size,
    height:height,
    curveSegments:12,
    bevelEnabled:true,
    bevelThickness:isBold ? .22 : .15,
    bevelSize:isBold ? .13 : .08,
    bevelSegments:2
  });
}

function updateModel(){
  if(!font){
    status.textContent="Loading font...";
    return;
  }

  status.textContent="Loading model...";

  const designFile=document.getElementById("design").value;
  const dogName=document.getElementById("dogName").value.trim()||"DOG";
  let textSize=parseFloat(document.getElementById("textSize").value)||8;
  let textHeight=parseFloat(document.getElementById("textHeight").value)||1.8;

  if(tagMesh){
    scene.remove(tagMesh);
    tagMesh.geometry.dispose();
  }

  if(textMesh){
    scene.remove(textMesh);
    textMesh.geometry.dispose();
  }

  const loader=new STLLoader();

  loader.load(
    designFile,
    function(geometry){
      geometry.center();
      geometry.computeBoundingBox();

      const tagWidth=geometry.boundingBox.max.x-geometry.boundingBox.min.x;
      const maxTextWidth=tagWidth*.62;

      const tagMaterial=new THREE.MeshStandardMaterial({
        color:0xf2c078,
        roughness:.42,
        metalness:.05
      });

      tagMesh=new THREE.Mesh(geometry,tagMaterial);
      tagMesh.rotation.x=-Math.PI/2;
      scene.add(tagMesh);

      let currentSize=textSize;
      let textGeometry=createTextGeometry(dogName,currentSize,textHeight);
      textGeometry.computeBoundingBox();

      let textWidth=textGeometry.boundingBox.max.x-textGeometry.boundingBox.min.x;

      while(textWidth>maxTextWidth && currentSize>2){
        currentSize-=.25;
        textGeometry.dispose();

        textGeometry=createTextGeometry(dogName,currentSize,textHeight);
        textGeometry.computeBoundingBox();

        textWidth=textGeometry.boundingBox.max.x-textGeometry.boundingBox.min.x;
      }

      textGeometry.center();

      const textMaterial=new THREE.MeshStandardMaterial({
        color:0x5a3217,
        roughness:.35,
        metalness:.05
      });

      textMesh=new THREE.Mesh(textGeometry,textMaterial);

      textMesh.position.set(0,1.5,-.5);
      textMesh.rotation.x=THREE.MathUtils.degToRad(90);
      textMesh.rotation.y=THREE.MathUtils.degToRad(180);
      textMesh.rotation.z=THREE.MathUtils.degToRad(0);

      scene.add(textMesh);

      camera.position.set(0,100,0);
      controls.target.set(0,0,0);
      controls.update();

      status.textContent="Preview ready 🐾";
    },
    undefined,
    function(error){
      status.textContent="STL could not be loaded. Check the exact file name.";
      console.error(error);
    }
  );
}

function downloadSTL(){
  if(!tagMesh||!textMesh){
    status.textContent="Create a preview first.";
    return;
  }

  const exportScene=new THREE.Scene();

  exportScene.add(tagMesh.clone());
  exportScene.add(textMesh.clone());

  const exporter=new STLExporter();
  const stlString=exporter.parse(exportScene);

  const dogName=document.getElementById("dogName").value.trim()||"dog";
  const safeName=dogName.replace(/[^a-z0-9]/gi,"_").toLowerCase();

  const blob=new Blob([stlString],{type:"text/plain"});
  const link=document.createElement("a");

  link.href=URL.createObjectURL(blob);
  link.download="doggy-tag-"+safeName+".stl";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  status.textContent="STL downloaded ✅";
}

function resizeViewer(){
  const viewer=document.getElementById("viewer");

  camera.aspect=viewer.clientWidth/viewer.clientHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(viewer.clientWidth,viewer.clientHeight);
}

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
</script>
</body>
</html>
