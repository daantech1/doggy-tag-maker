<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Doggy Tag Rotation Test</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: Arial;
      background: #fff4e8;
    }

    #panel {
      width: 340px;
      padding: 20px;
      background: #fff8ef;
      border-right: 4px solid #f6b26b;
      overflow: auto;
    }

    #viewer {
      flex: 1;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      box-sizing: border-box;
    }

    textarea {
      height: 150px;
      font-family: monospace;
      font-size: 12px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div id="panel">
    <h2>Rotation Test</h2>

    <label>Design</label>
    <select id="design">
      <option value="bone-with-rounding.stl">Bone with rounding</option>
      <option value="empty-bone.stl">Empty bone</option>
    </select>

    <label>Naam</label>
    <input id="dogName" value="Bobby" />

    <label>Tekstgrootte</label>
    <input id="textSize" type="number" value="8" step="0.5" />

    <label>Tekst X positie</label>
    <input id="posX" type="number" value="0" step="0.5" />

    <label>Tekst Y positie</label>
    <input id="posY" type="number" value="0" step="0.5" />

    <label>Tekst Z hoogte</label>
    <input id="posZ" type="number" value="3" step="0.5" />

    <label>Rotatie X graden</label>
    <input id="rotX" type="number" value="0" step="5" />

    <label>Rotatie Y graden</label>
    <input id="rotY" type="number" value="0" step="5" />

    <label>Rotatie Z graden</label>
    <input id="rotZ" type="number" value="0" step="5" />

    <button id="updateBtn">Update preview</button>

    <label>Code voor mij</label>
    <textarea id="codeOutput" readonly></textarea>
  </div>

  <div id="viewer"></div>

  <script type="module">
    import * as THREE from "three";
    import { STLLoader } from "three/addons/loaders/STLLoader.js";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { FontLoader } from "three/addons/loaders/FontLoader.js";
    import { TextGeometry } from "three/addons/geometries/TextGeometry.js";

    let scene, camera, renderer, controls;
    let tagMesh = null;
    let textMesh = null;
    let font = null;

    const inputs = [
      "design", "dogName", "textSize",
      "posX", "posY", "posZ",
      "rotX", "rotY", "rotZ"
    ];

    inputs.forEach(id => {
      document.getElementById(id).addEventListener("input", updateModel);
      document.getElementById(id).addEventListener("change", updateModel);
    });

    document.getElementById("updateBtn").addEventListener("click", updateModel);

    init();

    function init() {
      const viewer = document.getElementById("viewer");

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xfff4e8);

      camera = new THREE.PerspectiveCamera(
        45,
        viewer.clientWidth / viewer.clientHeight,
        0.1,
        2000
      );
      camera.position.set(0, -90, 70);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      viewer.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      scene.add(new THREE.AmbientLight(0xffffff, 0.85));

      const light = new THREE.DirectionalLight(0xffffff, 1.1);
      light.position.set(40, -50, 90);
      scene.add(light);

      new FontLoader().load(
        "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/helvetiker_regular.typeface.json",
        function (loadedFont) {
          font = loadedFont;
          updateModel();
        }
      );

      window.addEventListener("resize", resizeViewer);
      animate();
    }

    function updateModel() {
      if (!font) return;

      const designFile = document.getElementById("design").value;
      const dogName = document.getElementById("dogName").value.trim() || "DOG";
      const textSize = parseFloat(document.getElementById("textSize").value) || 8;

      const posX = parseFloat(document.getElementById("posX").value) || 0;
      const posY = parseFloat(document.getElementById("posY").value) || 0;
      const posZ = parseFloat(document.getElementById("posZ").value) || 3;

      const rotXdeg = parseFloat(document.getElementById("rotX").value) || 0;
      const rotYdeg = parseFloat(document.getElementById("rotY").value) || 0;
      const rotZdeg = parseFloat(document.getElementById("rotZ").value) || 0;

      const rotX = THREE.MathUtils.degToRad(rotXdeg);
      const rotY = THREE.MathUtils.degToRad(rotYdeg);
      const rotZ = THREE.MathUtils.degToRad(rotZdeg);

      if (tagMesh) scene.remove(tagMesh);
      if (textMesh) scene.remove(textMesh);

      new STLLoader().load(designFile, function (geometry) {
        geometry.center();

        tagMesh = new THREE.Mesh(
          geometry,
          new THREE.MeshStandardMaterial({ color: 0xf2c078 })
        );

        tagMesh.rotation.x = -Math.PI / 2;
        scene.add(tagMesh);

        const textGeometry = new TextGeometry(dogName, {
          font: font,
          size: textSize,
          height: 1.8,
          curveSegments: 12,
          bevelEnabled: true,
          bevelThickness: 0.15,
          bevelSize: 0.08,
          bevelSegments: 2
        });

        textGeometry.center();

        textMesh = new THREE.Mesh(
          textGeometry,
          new THREE.MeshStandardMaterial({ color: 0x5a3217 })
        );

        textMesh.position.set(posX, posY, posZ);
        textMesh.rotation.set(rotX, rotY, rotZ);

        scene.add(textMesh);

        document.getElementById("codeOutput").value =
`textMesh.position.set(${posX}, ${posY}, ${posZ});
textMesh.rotation.x = THREE.MathUtils.degToRad(${rotXdeg});
textMesh.rotation.y = THREE.MathUtils.degToRad(${rotYdeg});
textMesh.rotation.z = THREE.MathUtils.degToRad(${rotZdeg});`;
      });
    }

    function resizeViewer() {
      const viewer = document.getElementById("viewer");
      camera.aspect = viewer.clientWidth / viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
