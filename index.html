<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Doggy Tag Maker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    #panel {
      width: 300px;
      padding: 18px;
      background: #f3f3f3;
      box-sizing: border-box;
    }

    #viewer {
      flex: 1;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input, select, button {
      width: 100%;
      padding: 9px;
      margin-top: 7px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    #status {
      margin-top: 14px;
      font-size: 13px;
      color: #333;
    }
  </style>
</head>

<body>
  <div id="panel">
    <h2>Doggy Tag Maker</h2>

    <label>Design</label>
    <select id="design">
      <option value="bone-with-rounding.stl">Bone with rounding</option>
      <option value="empty-bone.stl">Empty bone</option>
    </select>

    <label>Naam</label>
    <input id="dogName" value="Bobby" />

    <label>Tekstgrootte</label>
    <input id="textSize" type="number" value="8" step="0.5" />

    <label>Teksthoogte</label>
    <input id="textHeight" type="number" value="1.8" step="0.1" />

    <label>Tekst omhoog/omlaag</label>
    <input id="textY" type="number" value="0" step="1" />

    <button id="previewBtn">Preview bijwerken</button>
    <button id="downloadBtn">Download STL</button>

    <div id="status">Laden...</div>
  </div>

  <div id="viewer"></div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js";
    import { STLLoader } from "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/STLLoader.js";
    import { STLExporter } from "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/exporters/STLExporter.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/controls/OrbitControls.js";
    import { FontLoader } from "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/loaders/FontLoader.js";
    import { TextGeometry } from "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/geometries/TextGeometry.js";

    let scene, camera, renderer, controls;
    let tagMesh = null;
    let textMesh = null;
    let font = null;

    const status = document.getElementById("status");

    document.getElementById("previewBtn").addEventListener("click", updateModel);
    document.getElementById("downloadBtn").addEventListener("click", downloadSTL);
    document.getElementById("design").addEventListener("change", updateModel);

    init();

    function init() {
      const viewer = document.getElementById("viewer");

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xffffff);

      camera = new THREE.PerspectiveCamera(
        45,
        viewer.clientWidth / viewer.clientHeight,
        0.1,
        2000
      );
      camera.position.set(0, -90, 70);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
      viewer.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;

      scene.add(new THREE.AmbientLight(0xffffff, 0.8));

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(40, -50, 80);
      scene.add(light);

      new FontLoader().load(
        "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/fonts/helvetiker_regular.typeface.json",
        function (loadedFont) {
          font = loadedFont;
          updateModel();
        },
        undefined,
        function (error) {
          status.textContent = "Font kon niet laden.";
          console.error(error);
        }
      );

      window.addEventListener("resize", resizeViewer);
      animate();
    }

    function updateModel() {
      if (!font) {
        status.textContent = "Font laden...";
        return;
      }

      status.textContent = "Model laden...";

      const designFile = document.getElementById("design").value;
      const dogName = document.getElementById("dogName").value.trim() || "DOG";
      const textSize = parseFloat(document.getElementById("textSize").value) || 8;
      const textHeight = parseFloat(document.getElementById("textHeight").value) || 1.8;
      const textY = parseFloat(document.getElementById("textY").value) || 0;

      if (tagMesh) {
        scene.remove(tagMesh);
        tagMesh.geometry.dispose();
      }

      if (textMesh) {
        scene.remove(textMesh);
        textMesh.geometry.dispose();
      }

      const loader = new STLLoader();

      loader.load(
        designFile,
        function (geometry) {
          geometry.center();

          const tagMaterial = new THREE.MeshStandardMaterial({
            color: 0xd8d8d8,
            roughness: 0.45
          });

          tagMesh = new THREE.Mesh(geometry, tagMaterial);
          tagMesh.rotation.x = -Math.PI / 2;
          scene.add(tagMesh);

          const textGeometry = new TextGeometry(dogName, {
            font: font,
            size: textSize,
            height: textHeight,
            curveSegments: 12,
            bevelEnabled: false
          });

          textGeometry.center();

          const textMaterial = new THREE.MeshStandardMaterial({
            color: 0x222222,
            roughness: 0.4
          });

          textMesh = new THREE.Mesh(textGeometry, textMaterial);
          textMesh.position.set(0, textY, 3);
          scene.add(textMesh);

          status.textContent = "Preview klaar.";
        },
        undefined,
        function (error) {
          status.textContent = "STL kon niet laden. Check bestandsnaam.";
          console.error(error);
        }
      );
    }

    function downloadSTL() {
      if (!tagMesh || !textMesh) {
        status.textContent = "Maak eerst een preview.";
        return;
      }

      const exportScene = new THREE.Scene();
      exportScene.add(tagMesh.clone());
      exportScene.add(textMesh.clone());

      const exporter = new STLExporter();
      const stlString = exporter.parse(exportScene);

      const dogName = document.getElementById("dogName").value.trim() || "dog";
      const safeName = dogName.replace(/[^a-z0-9]/gi, "_").toLowerCase();

      const blob = new Blob([stlString], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "doggy-tag-" + safeName + ".stl";
      link.click();

      status.textContent = "STL gedownload.";
    }

    function resizeViewer() {
      const viewer = document.getElementById("viewer");
      camera.aspect = viewer.clientWidth / viewer.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewer.clientWidth, viewer.clientHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
